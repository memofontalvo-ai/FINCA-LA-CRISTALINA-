<script type="module">
// Prevenir zoom por doble toque en iOS
(function(){

// ── FIREBASE ────────────────────────────────────────
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,onSnapshot,setDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const _app=initializeApp({apiKey:"AIzaSyC4Sjp3bvyKZwkC4B_F1jDDvCZykhiDusI",authDomain:"finca---huevos.firebaseapp.com",projectId:"finca---huevos",storageBucket:"finca---huevos.firebasestorage.app",messagingSenderId:"685097307783",appId:"1:685097307783:web:77fc9e5e1353ea7262b222"});
const _db=getFirestore(_app);
const _REF=doc(_db,"finca","estado");
var _fbOk=false;

// ── CONSTANTES ──────────────────────────────────────
var CPK = 30;
var GALPONES = [
  {id:1,n:"Galpón 1",g:180,c:"#e8a045",e:"🐔"},
  {id:2,n:"Galpón 2",g:170,c:"#5a9e6f",e:"🐓"},
  {id:3,n:"Galpón 3",g:185,c:"#7b6fa0",e:"🐣"}
];
var CATS = ["B","A","AA","AAA","Jumbo","Partidos"];
var CATS_VENTA = ["B","A","AA","AAA","Jumbo"];
var CC = {B:"#8d6e63",A:"#e8a045",AA:"#5a9e6f",AAA:"#7b6fa0",Jumbo:"#2196f3",Partidos:"#e74c3c"};
var CE = {B:"🟤",A:"🟡",AA:"🟢",AAA:"🟣",Jumbo:"🔵",Partidos:"💔"};
var PINS = {granjero:"1234",admin:"9999"};
var MAX_ANAQ = 10;

// ── HELPERS ─────────────────────────────────────────
function hoy(){return new Date().toISOString().split("T")[0];}
function fmtFecha(f){var p=f.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function fmtCanastas(n){var can=Math.floor(n/CPK);var sue=n%CPK;if(can>0&&sue>0)return can+" canasta"+(can>1?"s":"")+" + "+sue+" sueltos";if(can>0)return can+" canasta"+(can>1?"s":"");if(sue>0)return sue+" sueltos";return "0";}
function tgalpon(d,id){if(!d||!d[id])return 0;return (d[id].canastas||0)*CPK+(d[id].sueltos||0);}
function tturno(d){if(!d)return 0;var t=0;for(var i=0;i<GALPONES.length;i++)t+=tgalpon(d,GALPONES[i].id);return t;}
function tdia(fecha){var d=STATE.recolectas[fecha]||{};return tturno(d.manana)+tturno(d.tarde);}
function tinv(){var t=0;for(var i=0;i<CATS_VENTA.length;i++)t+=(STATE.inventario[CATS_VENTA[i]]||0);return t;}

// ── ESTADO ──────────────────────────────────────────
function estadoVacio(){
  return{
    recolectas:{},clasificaciones:{},
    inventario:{B:0,A:0,AA:0,AAA:0,Jumbo:0,Partidos:0},
    salidas:[],
    bloqueados:{recolectas:{},clasificaciones:{}}
  };
}
var STATE = estadoVacio();
var ROL = null;
var LOGIN_ROL = null;
var LOGIN_PIN = "";
var LOGIN_ERR = "";
var TAB_G = "recolecta";
var TAB_A = "inventario";

var _saveTimer=null;
function salvarLocal(){
  try{localStorage.setItem("finca_v5",JSON.stringify(STATE));}catch(e){}
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    try{setDoc(_REF,JSON.parse(JSON.stringify(STATE)));}catch(e){console.error("FB save:",e);}
  },800);
}

// Escuchar cambios Firebase en tiempo real
onSnapshot(_REF,function(snap){
  if(snap.exists()){STATE=Object.assign(estadoVacio(),snap.data());}
  _fbOk=true;
  if(!ROL)render();
},function(err){
  console.error("FB error:",err);
  _fbOk=false;
  try{var s=localStorage.getItem("finca_v5");if(s)STATE=Object.assign(estadoVacio(),JSON.parse(s));}catch(e){}
  render();
});
// Cargar local mientras Firebase conecta
try{var _ls=localStorage.getItem("finca_v5");if(_ls)STATE=Object.assign(estadoVacio(),JSON.parse(_ls));}catch(e){}
render();

// ── DOM HELPERS ─────────────────────────────────────
function el(tag,style,children){
  var e=document.createElement(tag);
  if(style)Object.assign(e.style,style);
  if(children){
    if(!Array.isArray(children))children=[children];
    for(var i=0;i<children.length;i++){
      var c=children[i];
      if(c===null||c===undefined||c===false)continue;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else e.appendChild(c);
    }
  }
  return e;
}
function txt(s){return document.createTextNode(String(s));}
function btn(label,style,onClick){
  var b=document.createElement("button");
  Object.assign(b.style,{border:"none",cursor:"pointer",fontFamily:"Georgia,serif"});
  if(style)Object.assign(b.style,style);
  if(typeof label==="string")b.textContent=label;
  else b.appendChild(label);
  b.addEventListener("click",onClick);
  return b;
}
function inp(type,value,style,onChange){
  var i=document.createElement("input");
  i.type=type;
  i.value=String(value||"");
  Object.assign(i.style,{fontFamily:"Georgia,serif"});
  if(style)Object.assign(i.style,style);
  if(onChange)i.addEventListener(type==="date"||type==="text"?"change":"input",onChange);
  return i;
}

function stepper(val,color,onChange){
  var n=parseInt(val)||0;
  var wrap=el("div",{display:"flex",alignItems:"center",borderRadius:"12px",border:"2px solid "+color+"55",overflow:"hidden",background:"#fff"});
  var bm=btn("-",{width:"46px",height:"46px",background:color+"22",color:color,fontSize:"24px",fontWeight:"bold",flexShrink:"0"},function(){onChange(String(Math.max(0,n-1)));});
  var ni=document.createElement("input");
  ni.type="number";ni.min="0";ni.value=String(val||"");
  Object.assign(ni.style,{flex:"1",border:"none",outline:"none",textAlign:"center",fontSize:"20px",fontWeight:"bold",color:"#2a1a00",background:"transparent",width:"0",minWidth:"0",padding:"0 4px",fontFamily:"Georgia,serif"});
  // Debounce: only rebuild after user stops typing (800ms), keeps keyboard open
  var _t=null;
  ni.addEventListener("input",function(e){
    var v=e.target.value;
    if(v===""||(/^\d+$/.test(v)&&parseInt(v)>=0)){
      if(_t)clearTimeout(_t);
      _t=setTimeout(function(){onChange(v);},800);
    }
  });
  ni.addEventListener("blur",function(e){
    // When user leaves field, update immediately
    if(_t)clearTimeout(_t);
    var v=e.target.value;
    if(v===""||(/^\d+$/.test(v)&&parseInt(v)>=0))onChange(v);
  });
  var bp=btn("+",{width:"46px",height:"46px",background:color+"22",color:color,fontSize:"24px",fontWeight:"bold",flexShrink:"0"},function(){onChange(String(n+1));});
  wrap.appendChild(bm);wrap.appendChild(ni);wrap.appendChild(bp);
  return wrap;
}

function badge(text,color){
  return el("span",{background:color+"22",color:color,borderRadius:"9px",padding:"4px 11px",fontSize:"13px",fontWeight:"bold"},[text]);
}

// ── RENDER PRINCIPAL ────────────────────────────────
function render(){
  var root=document.getElementById("root");
  root.innerHTML="";
  if(!ROL){renderLogin(root);return;}
  renderApp(root);
}

// ── LOGIN ────────────────────────────────────────────
function renderLogin(root){
  var wrap=el("div",{minHeight:"100vh",background:"linear-gradient(160deg,#3d2008,#7a4f1e 60%,#c17d3c)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"});

  if(!LOGIN_ROL){
    wrap.appendChild(el("div",{fontSize:"52px",marginBottom:"8px",textAlign:"center"},["🥚"]));
    wrap.appendChild(el("div",{color:"#fff",fontSize:"22px",fontWeight:"bold",marginBottom:"4px",textAlign:"center"},["Control de Huevos"]));
    wrap.appendChild(el("div",{color:"rgba(255,255,255,.6)",fontSize:"13px",marginBottom:"32px",textAlign:"center"},["Finca La Cristalina"]));
    wrap.appendChild(el("div",{color:"rgba(255,255,255,.8)",fontSize:"15px",marginBottom:"16px",textAlign:"center"},["¿Quién eres?"]));



    var roles=[["granjero","👨‍🌾","Granjero"],["admin","👔","Administrador"]];
    for(var i=0;i<roles.length;i++){
      (function(r){
        var b=btn(r[1]+" "+r[2],{width:"100%",padding:"18px",marginBottom:"12px",borderRadius:"16px",border:"2px solid rgba(255,255,255,.25)",background:"rgba(255,255,255,.12)",color:"#fff",fontSize:"17px",fontWeight:"bold"},
          function(){LOGIN_ROL=r[0];LOGIN_PIN="";LOGIN_ERR="";render();});
        wrap.appendChild(b);
      })(roles[i]);
    }
  } else {
    wrap.appendChild(el("div",{color:"#fff",fontSize:"18px",marginBottom:"4px",textAlign:"center"},[LOGIN_ROL==="granjero"?"👨‍🌾 Granjero":"👔 Administrador"]));
    wrap.appendChild(el("div",{color:"rgba(255,255,255,.6)",fontSize:"13px",marginBottom:"24px",textAlign:"center"},["Ingresa tu PIN de 4 dígitos"]));

    var dotsDiv=el("div",{display:"flex",justifyContent:"center",gap:"12px",marginBottom:"20px"});
    for(var d=0;d<4;d++){
      dotsDiv.appendChild(el("div",{width:"18px",height:"18px",borderRadius:"50%",background:LOGIN_PIN.length>d?"#fff":"rgba(255,255,255,.3)"},[]));
    }
    wrap.appendChild(dotsDiv);
    wrap.appendChild(el("div",{color:"#ff8a80",marginBottom:"12px",fontSize:"13px",minHeight:"20px",textAlign:"center"},[LOGIN_ERR]));

    var grid=el("div",{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"12px",width:"92%",maxWidth:"320px",margin:"0 auto 16px"});
    var keys=[1,2,3,4,5,6,7,8,9,"",0,"⌫"];
    for(var k=0;k<keys.length;k++){
      (function(d){
        var b=btn(d===""?"":String(d),{padding:"18px 0",borderRadius:"14px",background:d===""?"transparent":"rgba(255,255,255,.18)",color:"#fff",fontSize:"26px",fontWeight:"bold",width:"100%",cursor:d===""?"default":"pointer"},
          function(){
            if(d==="")return;
            if(d==="⌫"){LOGIN_PIN=LOGIN_PIN.slice(0,-1);LOGIN_ERR="";render();return;}
            if(LOGIN_PIN.length<4){
              LOGIN_PIN+=String(d);
              if(LOGIN_PIN.length===4){
                if(LOGIN_PIN===PINS[LOGIN_ROL]){ROL=LOGIN_ROL;LOGIN_ROL=null;LOGIN_PIN="";LOGIN_ERR="";}
                else{LOGIN_ERR="PIN incorrecto";LOGIN_PIN="";}
                render();
              } else {render();}
            }
          });
        grid.appendChild(b);
      })(keys[k]);
    }
    wrap.appendChild(grid);
    wrap.appendChild(btn("← Cambiar usuario",{background:"transparent",color:"rgba(255,255,255,.5)",fontSize:"13px"},function(){LOGIN_ROL=null;LOGIN_PIN="";LOGIN_ERR="";render();}));
  }
  root.appendChild(wrap);
}

// ── APP SHELL ────────────────────────────────────────
function renderApp(root){
  // Header
  var hdr=el("div",{background:"linear-gradient(135deg,#7a4f1e,#c17d3c)",padding:"16px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:"0",zIndex:"10",boxShadow:"0 4px 16px rgba(120,70,20,.3)"});
  var hl=el("div",{display:"flex",alignItems:"center",gap:"8px"});
  hl.appendChild(el("span",{fontSize:"22px"},["🥚"]));
  var ht=el("div",null);
  ht.appendChild(el("div",{fontSize:"16px",fontWeight:"bold"},["Control de Huevos"]));
  ht.appendChild(el("div",{fontSize:"11px",opacity:".8"},[(ROL==="granjero"?"👨‍🌾 Granjero":"👔 Admin")+(_fbOk?" · ☁️ Sincronizado":" · ⏳ Conectando...")]));
  hl.appendChild(ht);hdr.appendChild(hl);
  hdr.appendChild(btn("Salir 🔒",{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:"10px",padding:"6px 12px",fontSize:"12px"},function(){
  ROL=null;LOGIN_ROL=null;LOGIN_PIN="";LOGIN_ERR="";
  TAB_G="recolecta";TAB_A="inventario";
  render();
}));
  root.appendChild(hdr);

  // Contenido
  var cont=el("div",null);
  root.appendChild(cont);

  // Navegación
  var navEl=null;

  function cambiarTab(t){
    if(ROL==="granjero")TAB_G=t; else TAB_A=t;
    if(navEl)root.removeChild(navEl);
    mostrarVista();
    navEl=crearNav();
    root.appendChild(navEl);
  }

  function crearNav(){
    var tabs=ROL==="granjero"
      ?[{id:"recolecta",l:"🧺 Recolecta"},{id:"clasificar",l:"🔢 Clasificar"},{id:"empaque",l:"📦 Empaque"},{id:"historial",l:"📅 Historial"}]
      :[{id:"inventario",l:"📦 Inventario"},{id:"salida",l:"🚚 Salida"},{id:"historial",l:"📊 Historial"},{id:"produccion",l:"📈 Prod."}];
    var curTab=ROL==="granjero"?TAB_G:TAB_A;
    var color=ROL==="granjero"?"#5a9e6f":"#7a4f1e";
    var nav=el("div",{position:"fixed",bottom:"0",left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:"480px",background:"#fff",borderTop:"2px solid #f0e0c8",display:"flex",zIndex:"20"});
    for(var i=0;i<tabs.length;i++){
      (function(t){
        var b=btn(t.l,{flex:"1",padding:"10px 2px",background:"transparent",color:curTab===t.id?color:"#bbb",fontSize:"10px",fontWeight:curTab===t.id?"bold":"normal",borderTop:curTab===t.id?"3px solid "+color:"3px solid transparent"},function(){cambiarTab(t.id);});
        nav.appendChild(b);
      })(tabs[i]);
    }
    return nav;
  }

  function mostrarVista(){
    cont.innerHTML="";
    var v=null;
    try{
      if(ROL==="granjero"){
        if(TAB_G==="recolecta")v=vistaRecolecta(cont);
        else if(TAB_G==="clasificar")v=vistaClasificar(cont);
        else if(TAB_G==="empaque")v=vistaEmpaque(cont);
        else v=vistaHistGranjero();
      } else {
        if(TAB_A==="inventario")v=vistaInventario();
        else if(TAB_A==="salida")v=vistaSalida(cont);
        else if(TAB_A==="historial")v=vistaHistAdmin(cont);
        else v=vistaProduccion();
      }
      if(v)cont.appendChild(v);
    }catch(e){cont.innerHTML="<div style='padding:20px;color:#e74c3c'>Error: "+e.message+"</div>";console.error(e);}
  }

  mostrarVista();
  navEl=crearNav();
  root.appendChild(navEl);
}

// ── RECOLECTA ────────────────────────────────────────
function vistaRecolecta(cont,modoAdmin,fechaInicial,turnoInicial){
  var fecha=fechaInicial||hoy();
  var turno=turnoInicial||"manana";
  var ent={1:{c:"",s:""},2:{c:"",s:""},3:{c:"",s:""}};
  var guardado=false,error="";

  function cargarEx(){
    var ex=(STATE.recolectas[fecha]||{})[turno];
    for(var i=0;i<GALPONES.length;i++){
      var g=GALPONES[i];
      ent[g.id]=ex?{c:String(ex[g.id]?ex[g.id].canastas||"":""),s:String(ex[g.id]?ex[g.id].sueltos||"":"")}:{c:"",s:""};
    }
    guardado=false;error="";
  }
  cargarEx();

  function build(){
    var bloq=!modoAdmin&&STATE.bloqueados&&STATE.bloqueados.recolectas&&!!STATE.bloqueados.recolectas[fecha+"_"+turno];
    var yaGuard=!!(STATE.recolectas[fecha]&&STATE.recolectas[fecha][turno]);
    var totalPrev=0;
    for(var i=0;i<GALPONES.length;i++){var g=GALPONES[i];totalPrev+=(parseInt(ent[g.id].c)||0)*CPK+(parseInt(ent[g.id].s)||0);}

    cont.innerHTML="";
    var w=el("div",{padding:"20px 16px 90px"});
    w.appendChild(el("h3",{color:"#7a4f1e",marginBottom:"14px",fontSize:"16px"},["🧺 Registro de Recolecta"]));

    if(bloq)w.appendChild(el("div",{background:"#fff8e1",border:"2px solid #f9a825",borderRadius:"14px",padding:"14px",marginBottom:"16px",display:"flex",gap:"10px",alignItems:"center"},[
      el("span",{fontSize:"22px"},["🔒"]),
      el("div",null,[el("div",{fontWeight:"bold",color:"#e65100",fontSize:"14px"},["Registro bloqueado"]),el("div",{fontSize:"12px",color:"#888"},["Solo el admin puede modificarlo."])])
    ]));
